<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0f2440"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>
  <!-- Paper sheet (back) -->
  <rect x="60" y="40" width="140" height="180" rx="8" fill="#e2e8f0" opacity="0.3"/>
  <!-- Paper sheet (front) -->
  <rect x="50" y="32" width="140" height="180" rx="8" fill="#f1f5f9"/>
  <!-- Lines on paper -->
  <line x1="74" y1="72" x2="166" y2="72" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="74" y1="96" x2="150" y2="96" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="74" y1="120" x2="158" y2="120" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <line x1="74" y1="144" x2="130" y2="144" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <!-- Scissors / cut mark -->
  <circle cx="190" cy="168" r="32" fill="#3b82f6" opacity="0.9"/>
  <!-- Taka symbol in circle -->
  <text x="190" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white">৳</text>
</svg>
